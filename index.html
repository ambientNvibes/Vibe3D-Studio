<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Vibe 3D Studio - Self-contained 3D modeling editor with vertex workspace, quad topology, and face tools built with Three.js" />
    <meta name="theme-color" content="#06070a" />
    <title>Vibe 3D Studio V21.9.41 Vertex Workspace</title>
    <style>
        /* ========== ROOT & DESIGN TOKENS ========== */
        :root {
            --bg-0: #06070a;
            --bg-1: #0b0d12;
            --bg-2: #11151d;
            --panel: rgba(16, 18, 24, 0.82);
            --panel-strong: rgba(18, 20, 27, 0.96);
            --stroke: rgba(212, 175, 55, 0.16);
            --text: #efe7d4;
            --muted: #b8aa80;
            --gold: #d4af37;
            --gold-2: #f0d376;
            --shadow: 0 18px 36px rgba(0, 0, 0, 0.34);
            --blur: blur(18px);
            --right-w: 332px;
            --gap: 12px;
            --radius-xl: 24px;
            /* Frequently used opacity values */
            --rgba-gold-06: rgba(212, 175, 55, 0.06);
            --rgba-gold-15: rgba(212, 175, 55, 0.15);
            --rgba-gold-16: rgba(212, 175, 55, 0.16);
            --rgba-white-06: rgba(255, 255, 255, 0.06);
            --rgba-white-04: rgba(255, 255, 255, 0.04);
            --rgba-white-035: rgba(255, 255, 255, 0.035);
        }

        /* ========== RESET & BASE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, var(--rgba-gold-06), transparent 28%),
                radial-gradient(circle at top right, rgba(74, 110, 190, 0.07), transparent 28%),
                linear-gradient(180deg, var(--bg-2), var(--bg-0));
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
            color: var(--text);
        }

        body {
            position: fixed;
            inset: 0;
        }

        /* ========== CANVAS & BACKGROUND ========== */
        canvas {
            position: absolute;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            touch-action: none;
            z-index: 0;
        }

        .sky-gradient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background:
                radial-gradient(circle at 18% 16%, rgba(212, 175, 55, 0.08), transparent 20%),
                radial-gradient(circle at 84% 14%, rgba(94, 138, 255, 0.07), transparent 22%),
                radial-gradient(circle at 50% 100%, rgba(255, 176, 84, 0.04), transparent 24%);
        }

        /* ========== APP SHELL & LAYOUT ========== */
        .app-shell {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: 88px 1fr var(--right-w);
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "top top top"
                "left main right"
                "left bottom right";
            gap: var(--gap);
            padding: var(--gap);
            padding-bottom: calc(var(--gap) + env(safe-area-inset-bottom, 0px));
            pointer-events: none;
        }

        .glass {
            background: linear-gradient(180deg, rgba(30, 33, 42, 0.88), rgba(15, 17, 23, 0.84));
            border: 1px solid var(--stroke);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            box-shadow: var(--shadow);
        }

        .top-bar,
        .left-rail,
        .right-panel,
        .bottom-bar,
        #workspaceTabs,
        #renderWorkspacePanel,
        #animationBar {
            pointer-events: auto;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            grid-area: top;
            border-radius: var(--radius-xl);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            position: relative;
            z-index: 300;
            flex-wrap: wrap;
        }

        /* ========== BOTTOM BAR ========== */
        .bottom-bar {
            grid-area: bottom;
            border-radius: var(--radius-xl);
            padding: 8px 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            z-index: 200;
            overflow-x: auto;
            overflow-y: visible;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            align-content: flex-start;
            gap: 8px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            min-height: 72px;
            max-height: min(30vh, 220px);
        }

        .bottom-group {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.28);
            padding: 4px 10px;
            border-radius: 40px;
            flex-shrink: 0;
            max-width: 100%;
        }

        /* ========== BUTTON COMPONENTS ========== */
        .bottom-btn,
        .menu-btn,
        .tool-btn,
        .seg-btn,
        .tree-item,
        .preset-chip {
            background: var(--rgba-white-06);
            border: 1px solid var(--rgba-gold-15);
            color: var(--text);
            cursor: pointer;
            transition: none;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 10px 22px rgba(0, 0, 0, 0.22);
        }

        .bottom-btn {
            border: none;
            background: rgba(255, 255, 255, 0.08);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 30px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .bottom-btn:active,
        .menu-btn:active,
        .tool-btn:active,
        .seg-btn:active,
        .tree-item:active,
        .preset-chip:active {
            transform: scale(0.96);
        }

        .bottom-btn.active,
        .seg-btn.active,
        .tool-btn.active,
        .tree-item.active,
        .preset-chip.active {
            background: linear-gradient(180deg, var(--gold-2), var(--gold));
            color: #15120b;
            border-color: var(--gold);
        }

        .bottom-icon,
        .menu-icon,
        .toggle-icon {
            display: inline-block;
            min-width: 1em;
            text-align: center;
            line-height: 1;
            margin-right: 6px;
            font-weight: 700;
            color: transparent;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1.2px var(--gold);
        }

        .toggle-icon { margin-right: 0; }

        .bottom-btn.active .bottom-icon,
        .seg-btn.active .bottom-icon,
        .tool-btn.active .bottom-icon,
        .tree-item.active .bottom-icon,
        .preset-chip.active .bottom-icon,
        .bottom-btn.active .menu-icon,
        .seg-btn.active .menu-icon,
        .tool-btn.active .menu-icon {
            -webkit-text-stroke: 1.2px #18140c;
        }

        /* ========== LEFT RAIL ========== */
        .left-rail {
            grid-area: left;
            border-radius: var(--radius-xl);
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
            z-index: 160;
        }

        .left-rail-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            padding: 4px 0 2px;
        }

        .mode-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mode-btn {
            border: 1px solid var(--rgba-gold-15);
            background: var(--rgba-white-06);
            color: var(--text);
            border-radius: 18px;
            padding: 10px 6px;
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 10px 22px rgba(0, 0, 0, 0.22);
        }

        .mode-btn:active {
            transform: scale(0.96);
        }

        .mode-btn.active {
            background: linear-gradient(180deg, var(--gold-2), var(--gold));
            color: #15120b;
            border-color: var(--gold);
        }

        .mode-icon {
            display: inline-block;
            min-width: 1em;
            text-align: center;
            line-height: 1;
            font-weight: 700;
            color: transparent;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1.2px var(--gold);
            font-size: 16px;
        }

        .mode-btn.active .mode-icon {
            -webkit-text-stroke: 1.2px #18140c;
        }

        .mode-text {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .dock-mode-chip {
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.28);
            border: 1px solid rgba(212, 175, 55, 0.14);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--gold-2);
            font-weight: 700;
        }

        /* ========== VIEWPORT ========== */
        .viewport-wrap {
            grid-area: main;
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            pointer-events: none;
        }

        .viewport-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* ========== RIGHT PANEL ========== */
        .right-panel {
            grid-area: right;
            border-radius: var(--radius-xl);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            position: relative;
            z-index: 120;
        }

        /* ========== BRAND ========== */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-mark {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--gold-2), #b88a13);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.6), 0 0 16px rgba(212, 175, 55, 0.4);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 15px;
            font-weight: 800;
            white-space: nowrap;
        }

        .brand-subtitle {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ========== MENU ========== */
        .menu-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .menu-btn {
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .menu-wrap {
            position: relative;
            display: inline-block;
        }

        .menu-panel {
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 204px;
            background: rgba(18, 20, 27, 0.98);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 1000;
            backdrop-filter: blur(24px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .menu-wrap.open .menu-panel {
            display: flex;
        }

        .menu-item {
            background: var(--rgba-white-04);
            border: none;
            color: var(--text);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .menu-divider {
            height: 1px;
            background: rgba(212, 175, 55, 0.15);
            margin: 6px 0;
        }

        /* ========== STATUS & PILLS ========== */
        .top-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-chip,
        .status-pill,
        .mode-pill {
            background: rgba(10, 12, 16, 0.72);
            border: 1px solid rgba(212, 175, 55, 0.18);
            border-radius: 999px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 8px 18px rgba(0, 0, 0, 0.24);
            padding: 6px 12px;
            font-size: 11px;
            font-family: monospace;
        }

        .status-cluster {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }

        .panel-title {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* ========== INSPECTOR & SECTIONS ========== */
        .inspector-toggle {
            position: absolute;
            left: -14px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 74px;
            border-radius: 999px 0 0 999px;
            background: rgba(18, 20, 28, 0.96);
            border: 1px solid rgba(212, 175, 55, 0.22);
            color: var(--gold);
            font-size: 16px;
            cursor: pointer;
            z-index: 5;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 12px 22px rgba(0, 0, 0, 0.26);
        }

        details.inspector-section,
        .inspector-card,
        .help-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02));
        }

        details.inspector-section {
            border: 1px solid rgba(212, 175, 55, 0.10);
            border-radius: 14px;
            overflow: hidden;
        }

        .section-summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 12px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #dbc37a;
        }

        .section-summary::-webkit-details-marker { display: none; }

        .section-summary::after {
            content: "⌄";
            font-size: 14px;
            transition: none;
        }

        details[open] .section-summary::after {
            transform: rotate(180deg);
        }

        .section-body {
            padding: 0 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ========== FORM LAYOUTS ========== */
        .seg-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .seg-row-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .seg-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .seg-row-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .wide { width: 100%; }

        .field-grid { display: grid; gap: 8px; }

        .field-row {
            display: grid;
            grid-template-columns: 34px 1fr 1fr 1fr;
            gap: 6px;
            align-items: center;
        }

        .field-row label,
        .stack-label {
            font-size: 11px;
            color: var(--muted);
        }

        /* ========== INPUTS ========== */
        .num-input,
        .text-input {
            width: 100%;
            border: 1px solid rgba(212, 175, 55, 0.13);
            background: var(--rgba-white-035);
            color: var(--text);
            border-radius: 10px;
            padding: 8px;
            font-size: 11px;
        }

        .slider-stack { display: grid; gap: 8px; }

        .slider-row {
            display: grid;
            grid-template-columns: 52px 1fr 38px;
            gap: 8px;
            align-items: center;
        }

        .slider-row label,
        .slider-row output {
            font-size: 11px;
            color: var(--muted);
        }

        input[type="range"] {
            width: 100%;
            appearance: none;
            height: 4px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 999px;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 999px;
            background: var(--gold-2);
            border: 1px solid rgba(0, 0, 0, 0.18);
            cursor: pointer;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.10);
        }

        .color-wrap {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-input {
            width: 44px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--rgba-gold-16);
            background: var(--rgba-white-04);
            cursor: pointer;
        }

        /* ========== INSPECTOR CARD ========== */
        .inspector-card {
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .selection-name {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .mini-note {
            font-size: 11px;
            color: var(--muted);
            text-transform: capitalize;
        }

        /* ========== TREE COMPONENTS ========== */
        .tree-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
        }

        .tree-item {
            width: 100%;
            text-align: left;
            border-radius: 12px;
            padding: 8px 10px;
            font-size: 12px;
            background: var(--rgba-white-04);
        }

        .tree-item.group {
            padding-left: 10px;
        }

        .tree-item.child-1 { padding-left: 22px; }
        .tree-item.child-2 { padding-left: 34px; }
        .tree-item.child-3 { padding-left: 46px; }

        .tree-item.primary {
            box-shadow:
                inset 0 0 0 1px rgba(24, 20, 12, 0.22),
                0 0 0 1px rgba(240, 211, 118, 0.72),
                0 0 18px rgba(212, 175, 55, 0.18);
        }

        .tree-item.secondary-active {
            background: linear-gradient(180deg, rgba(125, 183, 255, 0.22), rgba(102, 170, 255, 0.12));
            color: var(--text);
            border-color: rgba(125, 183, 255, 0.46);
        }

        .tree-item.secondary-active .bottom-icon,
        .tree-item.secondary-active .menu-icon {
            -webkit-text-stroke: 1.2px var(--gold);
        }

        .tree-badge {
            float: right;
            font-size: 10px;
            line-height: 1;
            padding: 3px 6px;
            border-radius: 999px;
            margin-left: 6px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: var(--rgba-white-06);
            color: var(--text);
        }

        .tree-badge.primary {
            background: rgba(240, 211, 118, 0.2);
            border-color: rgba(240, 211, 118, 0.45);
            color: var(--gold-2);
        }

        .tree-badge.multi {
            background: rgba(102, 170, 255, 0.18);
            border-color: rgba(102, 170, 255, 0.42);
            color: #bcd9ff;
        }

        .tree-meta {
            display: block;
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ========== KIT COMPONENTS ========== */
        .kit-preview-list {
            display: grid;
            gap: 8px;
            margin-top: 10px;
            touch-action: pan-y;
        }

        .kit-preview-card {
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 10px;
            align-items: center;
            padding: 8px;
            border-radius: 14px;
            border: 1px solid rgba(212, 175, 55, 0.14);
            background: var(--rgba-white-04);
        }

        .kit-thumb {
            width: 72px;
            height: 56px;
            border-radius: 10px;
            border: 1px solid var(--rgba-gold-16);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            overflow: hidden;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .kit-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .kit-thumb-empty {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            padding: 8px;
            line-height: 1.3;
        }

        .kit-card-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }

        .kit-card-meta {
            font-size: 10px;
            color: var(--muted);
            line-height: 1.35;
        }

        .kit-card-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
        }

        .kit-static-row {
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 8px;
            align-items: center;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.12);
            background: var(--rgba-white-035);
        }

        .kit-static-pill {
            font-size: 11px;
            font-weight: 800;
            color: var(--gold-2);
            text-align: center;
        }

        .kit-card-actions .tool-btn {
            padding: 7px 8px;
            font-size: 10px;
            border-radius: 10px;
        }

        .kit-toolbar {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            margin-top: 8px;
        }

        /* ========== PRESETS ========== */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .preset-chip {
            border-radius: 14px;
            padding: 12px 12px;
            font-size: 12px;
            text-align: left;
            min-height: 68px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
            border: 1px solid var(--rgba-gold-16);
        }

        .preset-chip:hover {
            border-color: rgba(240, 211, 118, 0.34);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 12px 28px rgba(0, 0, 0, 0.24);
        }

        .preset-sub {
            display: block;
            margin-top: 5px;
            font-size: 10px;
            color: var(--muted);
            line-height: 1.35;
        }

        /* ========== HELP DIALOG ========== */
        .help-sheet {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            z-index: 800;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }

        .help-sheet.open { display: grid; }

        .help-card {
            width: min(460px, calc(100vw - 28px));
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 22px;
            padding: 20px;
